name: CI/CD to VPS

on:
  push:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Remote build over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: ${{ secrets.SERVER_PORT }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -euo pipefail

            REPO_DIR="$HOME/trip-planner"
            BRANCH="${{ github.ref_name }}"
            CI_TMP_DIR="$HOME/.cache/trip-planner-ci"
            mkdir -p "$CI_TMP_DIR"
            WORKDIR="$(mktemp -d "$CI_TMP_DIR/build.XXXXXX")"

            cleanup() {
              echo "Cleaning up $WORKDIR"
              if [ -d "$WORKDIR" ]; then
                git -C "$REPO_DIR" worktree remove "$WORKDIR" --force || true
                rm -rf "$WORKDIR" || true
              fi
            }
            trap cleanup EXIT

            find "$CI_TMP_DIR" -maxdepth 1 -type d \( -name "build.*" -o -name "test.*" \) -mtime +1 -exec rm -rf {} + || true

            echo "Building branch: $BRANCH"
            cd "$REPO_DIR"
            git config --global --add safe.directory "$REPO_DIR"
            git fetch origin

            git worktree add --force --detach "$WORKDIR" "origin/$BRANCH"

            cd "$WORKDIR"
            docker compose build

  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Run backend tests via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: ${{ secrets.SERVER_PORT }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -euo pipefail

            REPO_DIR="$HOME/trip-planner"
            BRANCH="${{ github.ref_name }}"
            CI_TMP_DIR="$HOME/.cache/trip-planner-ci"
            mkdir -p "$CI_TMP_DIR"
            WORKDIR="$(mktemp -d "$CI_TMP_DIR/test.XXXXXX")"

            cleanup() {
              echo "Cleaning up $WORKDIR"
              if [ -d "$WORKDIR" ]; then
                git -C "$REPO_DIR" worktree remove "$WORKDIR" --force || true
                rm -rf "$WORKDIR" || true
              fi
            }
            trap cleanup EXIT

            find "$CI_TMP_DIR" -maxdepth 1 -type d \( -name "build.*" -o -name "test.*" \) -mtime +1 -exec rm -rf {} + || true

            echo "Testing branch: $BRANCH"
            cd "$REPO_DIR"
            git config --global --add safe.directory "$REPO_DIR"
            git fetch origin

            git worktree add --force --detach "$WORKDIR" "origin/$BRANCH"

            cd "$WORKDIR"
            docker compose run --rm --no-deps \
              -e DATABASE_URL=sqlite:///:memory: \
              -e SECRET_KEY=test-secret-key \
              -e GOOGLE_PLACES_API_KEY=test-google-key \
              backend python -m pytest tests -q

  deploy:
    runs-on: ubuntu-latest
    needs: test
    #if: github.ref_name == 'backupBranch'

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: ${{ secrets.SERVER_PORT }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -euo pipefail
            cd /applications/trip-planner
            git config --global --add safe.directory /applications/trip-planner

            BRANCH=${{ github.ref_name }}
            echo "Deploying branch: $BRANCH"

            git fetch origin
            git checkout "$BRANCH"
            git reset --hard "origin/$BRANCH"
            docker compose up -d --build

  api-test:
    runs-on: ubuntu-latest
    needs: deploy
    # if: github.ref_name == 'backupBranch'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Newman
        run: npm install -g newman

      - name: Wait for API
        run: |
          for i in {1..12}; do
            if curl -fsS https://trip.liberty-music.lol >/dev/null; then
              echo "API is up"
              exit 0
            fi
            echo "Waiting for API..."
            sleep 5
          done
          echo "API failed to start"
          exit 1

      - name: Run smoke collection
        run: |
          newman run tests/postman/smoke.json \
            --env-var baseUrl=https://trip.liberty-music.lol
