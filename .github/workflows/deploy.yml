name: CI/CD to VPS

on:
  push:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Remote build over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: ${{ secrets.SERVER_PORT }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            cd /applications/trip-planner
            git config --global --add safe.directory /applications/trip-planner

            BRANCH=${{ github.ref_name }}
            echo "Building branch: $BRANCH"

            git fetch origin
            git checkout "$BRANCH"
            git reset --hard "origin/$BRANCH"
            docker compose build

  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - run: echo "run tests"
      # todo: add actual tests here

  deploy:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref_name == 'backupBranch' || github.ref_name == 'feature-api-tests'

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: ${{ secrets.SERVER_PORT }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            cd /applications/trip-planner
            git config --global --add safe.directory /applications/trip-planner

            BRANCH=${{ github.ref_name }}
            echo "Deploying branch: $BRANCH"

            git fetch origin
            git checkout "$BRANCH"
            git reset --hard "origin/$BRANCH"
            docker compose up -d --build

  api-test:
    runs-on: ubuntu-latest
    needs: deploy
    if: github.ref_name == 'backupBranch' || github.ref_name == 'feature-api-tests'

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Wait for service
        run: sleep 10

      - name: Install Newman
        run: npm install -g newman

      - name: Run API tests
        run: |
          newman run tests/postman/collection.json \
            --env-var baseUrl=https://trip.liberty-music.lol