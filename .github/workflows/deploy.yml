name: CI/CD to VPS

on:
  push:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Remote build over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: ${{ secrets.SERVER_PORT }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -euo pipefail

            REPO_DIR="$HOME/trip-planner"
            BRANCH="${{ github.ref_name }}"
            CI_TMP_DIR="$HOME/.cache/trip-planner-ci"
            mkdir -p "$CI_TMP_DIR"
            WORKDIR="$(mktemp -d "$CI_TMP_DIR/build.XXXXXX")"

            cleanup() {
              echo "Cleaning up $WORKDIR"
              if [ -d "$WORKDIR" ]; then
                git -C "$REPO_DIR" worktree remove "$WORKDIR" --force || true
                rm -rf "$WORKDIR" || true
              fi
            }
            trap cleanup EXIT

            find "$CI_TMP_DIR" -maxdepth 1 -type d \( -name "build.*" -o -name "test.*" \) -mtime +1 -exec rm -rf {} + || true

            echo "Building branch: $BRANCH"
            cd "$REPO_DIR"
            git config --global --add safe.directory "$REPO_DIR"
            git fetch origin

            git worktree add --force --detach "$WORKDIR" "origin/$BRANCH"

            cd "$WORKDIR"
            docker compose build

  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Run backend tests via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: ${{ secrets.SERVER_PORT }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -euo pipefail

            REPO_DIR="$HOME/trip-planner"
            BRANCH="${{ github.ref_name }}"
            CI_TMP_DIR="$HOME/.cache/trip-planner-ci"
            mkdir -p "$CI_TMP_DIR"
            WORKDIR="$(mktemp -d "$CI_TMP_DIR/test.XXXXXX")"

            cleanup() {
              echo "Cleaning up $WORKDIR"
              if [ -d "$WORKDIR" ]; then
                git -C "$REPO_DIR" worktree remove "$WORKDIR" --force || true
                rm -rf "$WORKDIR" || true
              fi
            }
            trap cleanup EXIT

            find "$CI_TMP_DIR" -maxdepth 1 -type d \( -name "build.*" -o -name "test.*" \) -mtime +1 -exec rm -rf {} + || true

            echo "Testing branch: $BRANCH"
            cd "$REPO_DIR"
            git config --global --add safe.directory "$REPO_DIR"
            git fetch origin

            git worktree add --force --detach "$WORKDIR" "origin/$BRANCH"

            cd "$WORKDIR"
            docker compose run --rm --no-deps \
              -e DATABASE_URL=sqlite:///:memory: \
              -e SECRET_KEY=test-secret-key \
              -e GOOGLE_PLACES_API_KEY=test-google-key \
              backend python -m pytest tests -q

  deploy:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: ${{ secrets.SERVER_PORT }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -euo pipefail

            BRANCH="${{ github.ref_name }}"
            APP_DIR="/applications/trip-planner"

            if [ "$BRANCH" = "backupBranch" ]; then
              COMPOSE_FILES="-f compose.yml"
              PROJECT_NAME="trip_planner_prod"
              TARGET_URL="https://trip.liberty-music.lol"
              export BACKEND_PORT=8000
              export FRONTEND_PORT=8080
              export POSTGRES_VOLUME_NAME=trip-planner-prod-postgres-data
            else
              COMPOSE_FILES="-f compose.yml -f compose.test.yml"
              PROJECT_NAME="trip_planner_test"
              TARGET_URL="https://test.liberty-music.lol"
              export TEST_BACKEND_PORT=8001
              export TEST_FRONTEND_PORT=8081
              export POSTGRES_VOLUME_NAME=trip-planner-test-postgres-data
            fi

            echo "Deploying branch: $BRANCH"
            echo "App dir: $APP_DIR"
            echo "Target: $TARGET_URL"

            if [ ! -d "$APP_DIR/.git" ]; then
              git clone git@github.com:${{ github.repository }}.git "$APP_DIR"
            fi

            cd "$APP_DIR"
            git config --global --add safe.directory "$APP_DIR"

            git fetch origin
            git switch --force-create "$BRANCH" "origin/$BRANCH"

            docker compose $COMPOSE_FILES -p "$PROJECT_NAME" up -d --build

  api-test:
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Newman
        run: npm install -g newman

      - name: Set target URL
        id: target
        run: |
          BRANCH="${{ github.ref_name }}"
          if [ "$BRANCH" = "backupBranch" ]; then
            echo "base_url=https://trip.liberty-music.lol" >> "$GITHUB_OUTPUT"
          else
            echo "base_url=https://test.liberty-music.lol" >> "$GITHUB_OUTPUT"
          fi

      - name: Wait for API
        run: |
          for i in {1..12}; do
            if curl -fsS "${{ steps.target.outputs.base_url }}" >/dev/null; then
              echo "API is up"
              exit 0
            fi
            echo "Waiting for API..."
            sleep 5
          done
          echo "API failed to start"
          exit 1

      - name: Run smoke collection
        run: |
          newman run tests/postman/smoke.json \
            --env-var baseUrl=${{ steps.target.outputs.base_url }}
