name: CI/CD to VPS

on:
  push:

concurrency:
  group: trip-planner-cicd
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Remote build over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: ${{ secrets.SERVER_PORT }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -euo pipefail

            REPO_DIR="$HOME/trip-planner"
            BRANCH="${{ github.ref_name }}"
            IMAGE_TAG="${{ github.sha }}"
            CI_TMP_DIR="$HOME/.cache/trip-planner-ci"
            mkdir -p "$CI_TMP_DIR"
            WORKDIR="$(mktemp -d "$CI_TMP_DIR/build.XXXXXX")"

            cleanup() {
              echo "Cleaning up $WORKDIR"
              if [ -d "$WORKDIR" ]; then
                git -C "$REPO_DIR" worktree remove "$WORKDIR" --force || true
                rm -rf "$WORKDIR" || true
              fi
            }
            trap cleanup EXIT

            find "$CI_TMP_DIR" -maxdepth 1 -type d \( -name "build.*" -o -name "test.*" \) -mtime +1 -exec rm -rf {} + || true

            echo "Building branch: $BRANCH"
            cd "$REPO_DIR"
            git config --global --add safe.directory "$REPO_DIR"
            git fetch origin

            git worktree add --force --detach "$WORKDIR" "origin/$BRANCH"

            cd "$WORKDIR"
            if [ "$BRANCH" = "backupBranch" ]; then
              COMPOSE_FILES="-f compose.yml"
              IMAGE_ENV="prod"
            else
              COMPOSE_FILES="-f compose.yml -f compose.test.yml"
              IMAGE_ENV="test"
            fi

            export BACKEND_IMAGE="trip-planner/backend:${IMAGE_ENV}-${IMAGE_TAG}"
            export FRONTEND_IMAGE="trip-planner/frontend:${IMAGE_ENV}-${IMAGE_TAG}"

            docker compose $COMPOSE_FILES build

  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Run backend tests via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: ${{ secrets.SERVER_PORT }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -euo pipefail

            REPO_DIR="$HOME/trip-planner"
            BRANCH="${{ github.ref_name }}"
            IMAGE_TAG="${{ github.sha }}"
            CI_TMP_DIR="$HOME/.cache/trip-planner-ci"
            mkdir -p "$CI_TMP_DIR"
            WORKDIR="$(mktemp -d "$CI_TMP_DIR/test.XXXXXX")"

            cleanup() {
              echo "Cleaning up $WORKDIR"
              if [ -d "$WORKDIR" ]; then
                git -C "$REPO_DIR" worktree remove "$WORKDIR" --force || true
                rm -rf "$WORKDIR" || true
              fi
            }
            trap cleanup EXIT

            find "$CI_TMP_DIR" -maxdepth 1 -type d \( -name "build.*" -o -name "test.*" \) -mtime +1 -exec rm -rf {} + || true

            echo "Testing branch: $BRANCH"
            cd "$REPO_DIR"
            git config --global --add safe.directory "$REPO_DIR"
            git fetch origin

            git worktree add --force --detach "$WORKDIR" "origin/$BRANCH"

            cd "$WORKDIR"
            if [ "$BRANCH" = "backupBranch" ]; then
              IMAGE_ENV="prod"
            else
              IMAGE_ENV="test"
            fi

            export BACKEND_IMAGE="trip-planner/backend:${IMAGE_ENV}-${IMAGE_TAG}"
            export FRONTEND_IMAGE="trip-planner/frontend:${IMAGE_ENV}-${IMAGE_TAG}"

            docker image inspect "$BACKEND_IMAGE" >/dev/null
            docker run --rm \
              -e DATABASE_URL=sqlite:///:memory: \
              -e SECRET_KEY=test-secret-key \
              -e GOOGLE_PLACES_API_KEY=test-google-key \
              "$BACKEND_IMAGE" python -m pytest tests -q

  deploy:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: ${{ secrets.SERVER_PORT }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -euo pipefail

            BRANCH="${{ github.ref_name }}"
            IMAGE_TAG="${{ github.sha }}"
            APP_DIR="/applications/trip-planner"

            if [ "$BRANCH" = "backupBranch" ]; then
              COMPOSE_FILES="-f compose.yml"
              IMAGE_ENV="prod"
              PROJECT_NAME="trip_planner_prod"
              TARGET_URL="https://trip.liberty-music.lol"
              export BACKEND_PORT=8000
              export FRONTEND_PORT=8080
              BACKEND_BIND_PORT="$BACKEND_PORT"
              FRONTEND_BIND_PORT="$FRONTEND_PORT"
              export POSTGRES_VOLUME_NAME=trip-planner-prod-postgres-data
            else
              COMPOSE_FILES="-f compose.yml -f compose.test.yml"
              IMAGE_ENV="test"
              PROJECT_NAME="trip_planner_test"
              TARGET_URL="https://test.liberty-music.lol"
              export TEST_BACKEND_PORT=8001
              export TEST_FRONTEND_PORT=8081
              BACKEND_BIND_PORT="$TEST_BACKEND_PORT"
              FRONTEND_BIND_PORT="$TEST_FRONTEND_PORT"
              export POSTGRES_VOLUME_NAME=trip-planner-test-postgres-data
            fi

            echo "Deploying branch: $BRANCH"
            echo "App dir: $APP_DIR"
            echo "Target: $TARGET_URL"

            if [ ! -d "$APP_DIR/.git" ]; then
              git clone git@github.com:${{ github.repository }}.git "$APP_DIR"
            fi

            cd "$APP_DIR"
            git config --global --add safe.directory "$APP_DIR"

            git fetch origin
            git switch --force-create "$BRANCH" "origin/$BRANCH"

            export BACKEND_IMAGE="trip-planner/backend:${IMAGE_ENV}-${IMAGE_TAG}"
            export FRONTEND_IMAGE="trip-planner/frontend:${IMAGE_ENV}-${IMAGE_TAG}"

            docker image inspect "$BACKEND_IMAGE" >/dev/null
            docker image inspect "$FRONTEND_IMAGE" >/dev/null

            cleanup_stale_port_containers() {
              local service="$1"
              local port="$2"

              docker ps -aq \
                --filter "label=com.docker.compose.service=$service" \
                --filter "publish=$port" \
                | while read -r container_id; do
                    [ -n "$container_id" ] || continue

                    project="$(docker inspect -f '{{ index .Config.Labels "com.docker.compose.project" }}' "$container_id" 2>/dev/null || true)"
                    name="$(docker inspect -f '{{ .Name }}' "$container_id" 2>/dev/null | sed 's#^/##' || true)"

                    case "$project" in
                      "$PROJECT_NAME")
                        ;;
                      build*|test*|tmp*|trip-planner|trip-planner-test)
                        echo "Removing stale $service container $name from project $project on port $port"
                        docker rm -f "$container_id"
                        ;;
                    esac
                  done
            }

            cleanup_stale_port_containers backend "$BACKEND_BIND_PORT"
            cleanup_stale_port_containers frontend "$FRONTEND_BIND_PORT"

            docker compose $COMPOSE_FILES -p "$PROJECT_NAME" up -d --no-build

  api-test:
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Newman
        run: npm install -g newman

      - name: Set target URL
        id: target
        run: |
          BRANCH="${{ github.ref_name }}"
          if [ "$BRANCH" = "backupBranch" ]; then
            echo "base_url=https://trip.liberty-music.lol" >> "$GITHUB_OUTPUT"
          else
            echo "base_url=https://test.liberty-music.lol" >> "$GITHUB_OUTPUT"
          fi

      - name: Wait for API
        run: |
          for i in {1..12}; do
            if curl -fsS "${{ steps.target.outputs.base_url }}" >/dev/null; then
              echo "API is up"
              exit 0
            fi
            echo "Waiting for API..."
            sleep 5
          done
          echo "API failed to start"
          exit 1

      - name: Run smoke collection
        run: |
          newman run tests/postman/smoke.json \
            --env-var baseUrl=${{ steps.target.outputs.base_url }}

      - name: Cleanup old deployment images
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: ${{ secrets.SERVER_PORT }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -euo pipefail

            BRANCH="${{ github.ref_name }}"
            IMAGE_TAG="${{ github.sha }}"

            if [ "$BRANCH" = "backupBranch" ]; then
              IMAGE_ENV="prod"
            else
              IMAGE_ENV="test"
            fi

            BACKEND_IMAGE="trip-planner/backend:${IMAGE_ENV}-${IMAGE_TAG}"
            FRONTEND_IMAGE="trip-planner/frontend:${IMAGE_ENV}-${IMAGE_TAG}"

            docker image inspect "$BACKEND_IMAGE" >/dev/null
            docker image inspect "$FRONTEND_IMAGE" >/dev/null

            cleanup_old_images() {
              local repository="$1"
              local current_image="$2"
              local image_env="$3"

              docker image ls "$repository" --format '{{.Repository}}:{{.Tag}}' \
                | while read -r image_ref; do
                    [ -n "$image_ref" ] || continue
                    [ "$image_ref" != "$current_image" ] || continue

                    tag="${image_ref##*:}"
                    case "$tag" in
                      "$image_env"-*)
                        echo "Removing old image $image_ref"
                        docker image rm "$image_ref" || true
                        ;;
                    esac
                  done
            }

            cleanup_old_images "trip-planner/backend" "$BACKEND_IMAGE" "$IMAGE_ENV"
            cleanup_old_images "trip-planner/frontend" "$FRONTEND_IMAGE" "$IMAGE_ENV"
            docker image prune -f
            docker builder prune -f --filter "until=168h"
