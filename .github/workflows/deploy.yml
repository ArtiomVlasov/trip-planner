name: CI/CD to VPS

on:
  push:

jobs:
  pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Remote queued CI/CD over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: ${{ secrets.SERVER_PORT }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -euo pipefail

            REPO_DIR="$HOME/trip-planner"
            APP_DIR="/applications/trip-planner"
            BRANCH="${{ github.ref_name }}"
            IMAGE_TAG="${{ github.sha }}"
            RUN_NUMBER="${{ github.run_number }}"
            RUN_ATTEMPT="${{ github.run_attempt }}"
            RUN_ID="${{ github.run_id }}"
            CI_TMP_DIR="$HOME/.cache/trip-planner-ci"
            QUEUE_DIR="$CI_TMP_DIR/queue"
            LOCK_FILE="$CI_TMP_DIR/trip-planner-ci.lock"

            mkdir -p "$CI_TMP_DIR" "$QUEUE_DIR"
            command -v flock >/dev/null

            RUN_KEY="$(printf '%012d-%04d-%s' "$RUN_NUMBER" "$RUN_ATTEMPT" "$RUN_ID")"
            QUEUE_FILE="$QUEUE_DIR/$RUN_KEY"
            WORKDIR=""
            BACKEND_IMAGE=""
            FRONTEND_IMAGE=""
            NEWMAN_IMAGE_PULLED=false

            cleanup() {
              echo "Cleaning up CI/CD run $RUN_KEY"
              rm -f "$QUEUE_FILE" || true

              if [ -n "${WORKDIR:-}" ] && [ -d "$WORKDIR" ]; then
                git -C "$REPO_DIR" worktree remove "$WORKDIR" --force || true
                rm -rf "$WORKDIR" || true
              fi

              if [ -n "${BACKEND_IMAGE:-}" ]; then
                docker image rm -f "$BACKEND_IMAGE" || true
              fi

              if [ -n "${FRONTEND_IMAGE:-}" ]; then
                docker image rm -f "$FRONTEND_IMAGE" || true
              fi

              if [ "${NEWMAN_IMAGE_PULLED:-false}" = "true" ]; then
                docker image rm -f postman/newman:6-alpine || true
              fi

              docker image prune -f || true
              docker builder prune -f --filter "until=168h" || true
            }
            trap cleanup EXIT

            first_queue_entry() {
              find "$QUEUE_DIR" -maxdepth 1 -type f -printf '%f\n' 2>/dev/null | sort | head -n 1 || true
            }

            configure_environment() {
              if [ "$BRANCH" = "backupBranch" ]; then
                COMPOSE_FILES="-f compose.yml"
                IMAGE_ENV="prod"
                PROJECT_NAME="trip_planner_prod"
                TARGET_URL="https://trip.liberty-music.lol"
                export BACKEND_PORT=8000
                export FRONTEND_PORT=8080
                BACKEND_BIND_PORT="$BACKEND_PORT"
                FRONTEND_BIND_PORT="$FRONTEND_PORT"
                export POSTGRES_VOLUME_NAME=trip-planner-prod-postgres-data
              else
                COMPOSE_FILES="-f compose.yml -f compose.test.yml"
                IMAGE_ENV="test"
                PROJECT_NAME="trip_planner_test"
                TARGET_URL="https://test.liberty-music.lol"
                export TEST_BACKEND_PORT=8001
                export TEST_FRONTEND_PORT=8081
                BACKEND_BIND_PORT="$TEST_BACKEND_PORT"
                FRONTEND_BIND_PORT="$TEST_FRONTEND_PORT"
                export POSTGRES_VOLUME_NAME=trip-planner-test-postgres-data
              fi

              export BACKEND_IMAGE="trip-planner/backend:${IMAGE_ENV}-${IMAGE_TAG}"
              export FRONTEND_IMAGE="trip-planner/frontend:${IMAGE_ENV}-${IMAGE_TAG}"
            }

            cleanup_stale_port_containers() {
              service="$1"
              port="$2"

              docker ps -aq \
                --filter "label=com.docker.compose.service=$service" \
                --filter "publish=$port" \
                | while read -r container_id; do
                    [ -n "$container_id" ] || continue

                    project="$(docker inspect -f '{{ index .Config.Labels "com.docker.compose.project" }}' "$container_id" 2>/dev/null || true)"
                    name="$(docker inspect -f '{{ .Name }}' "$container_id" 2>/dev/null | sed 's#^/##' || true)"

                    case "$project" in
                      "$PROJECT_NAME")
                        ;;
                      build*|test*|tmp*|trip-planner|trip-planner-test)
                        echo "Removing stale $service container $name from project $project on port $port"
                        docker rm -f "$container_id" || true
                        ;;
                    esac
                  done
            }

            wait_for_api() {
              echo "Waiting for API: $TARGET_URL"
              for i in {1..12}; do
                if curl -fsS "$TARGET_URL" >/dev/null; then
                  echo "API is up"
                  return 0
                fi

                echo "Waiting for API..."
                sleep 5
              done

              echo "API failed to start"
              return 1
            }

            run_smoke_collection() {
              if command -v newman >/dev/null 2>&1; then
                newman run "$WORKDIR/tests/postman/smoke.json" \
                  --env-var "baseUrl=$TARGET_URL"
                return
              fi

              if ! docker image inspect postman/newman:6-alpine >/dev/null 2>&1; then
                NEWMAN_IMAGE_PULLED=true
              fi

              docker run --rm \
                -v "$WORKDIR/tests/postman:/etc/newman:ro" \
                postman/newman:6-alpine \
                run /etc/newman/smoke.json \
                --env-var "baseUrl=$TARGET_URL"
            }

            run_pipeline() {
              configure_environment

              WORKDIR="$(mktemp -d "$CI_TMP_DIR/pipeline.XXXXXX")"
              find "$CI_TMP_DIR" -maxdepth 1 -type d \( -name "build.*" -o -name "test.*" -o -name "pipeline.*" \) -mtime +1 -exec rm -rf {} + || true

              echo "Building branch: $BRANCH"
              cd "$REPO_DIR"
              git config --global --add safe.directory "$REPO_DIR"
              git fetch origin
              git worktree add --force --detach "$WORKDIR" "origin/$BRANCH"

              cd "$WORKDIR"
              docker compose $COMPOSE_FILES build

              docker image inspect "$BACKEND_IMAGE" >/dev/null
              docker image inspect "$FRONTEND_IMAGE" >/dev/null

              echo "Running backend tests"
              docker run --rm \
                -e DATABASE_URL=sqlite:///:memory: \
                -e SECRET_KEY=test-secret-key \
                -e GOOGLE_PLACES_API_KEY=test-google-key \
                "$BACKEND_IMAGE" python -m pytest tests -q

              echo "Deploying branch: $BRANCH"
              echo "App dir: $APP_DIR"
              echo "Target: $TARGET_URL"

              if [ ! -d "$APP_DIR/.git" ]; then
                git clone git@github.com:${{ github.repository }}.git "$APP_DIR"
              fi

              cd "$APP_DIR"
              git config --global --add safe.directory "$APP_DIR"
              git fetch origin
              git switch --force-create "$BRANCH" "origin/$BRANCH"

              docker image inspect "$BACKEND_IMAGE" >/dev/null
              docker image inspect "$FRONTEND_IMAGE" >/dev/null

              cleanup_stale_port_containers backend "$BACKEND_BIND_PORT"
              cleanup_stale_port_containers frontend "$FRONTEND_BIND_PORT"

              docker compose $COMPOSE_FILES -p "$PROJECT_NAME" up -d --no-build

              wait_for_api
              run_smoke_collection
            }

            printf 'branch=%s\nsha=%s\ncreated=%s\n' "$BRANCH" "$IMAGE_TAG" "$(date -Is)" > "$QUEUE_FILE"
            find "$QUEUE_DIR" -maxdepth 1 -type f -mmin +1440 -delete || true

            echo "Queued CI/CD run $RUN_KEY for branch $BRANCH"
            while true; do
              FIRST_RUN="$(first_queue_entry)"

              if [ "$FIRST_RUN" = "$RUN_KEY" ]; then
                if flock -n 200; then
                  FIRST_RUN="$(first_queue_entry)"
                  if [ "$FIRST_RUN" = "$RUN_KEY" ]; then
                    echo "CI/CD lock acquired for $RUN_KEY"
                    run_pipeline
                    rm -f "$QUEUE_FILE"
                    exit 0
                  fi

                  flock -u 200
                fi
              else
                echo "Waiting for older CI/CD run: ${FIRST_RUN:-none}"
              fi

              sleep 10
            done 200>"$LOCK_FILE"
