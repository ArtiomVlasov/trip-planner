services:
  backend:
    environment:
      BACKEND_CORS_ORIGINS: ${BACKEND_CORS_ORIGINS:-https://test.liberty-music.lol,https://trip.liberty-music.lol,http://localhost:8080,http://localhost:5173}

  frontend:
    build:
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-https://test.liberty-music.lol}
        VITE_YANDEX_MAPS_API_KEY: ${VITE_YANDEX_MAPS_API_KEY:-}

volumes:
  postgres_data:
    name: ${POSTGRES_VOLUME_NAME:-trip-planner-test-postgres-data}
