services:
  backend:
    build:
      context: .
      dockerfile: components/backend/Dockerfile
    container_name: trip-planner-backend
    ports:
      - "127.0.0.1:18000:8000"
    environment:
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      SECRET_KEY: ${SECRET_KEY}
      GOOGLE_PLACES_API_KEY: ${GOOGLE_PLACES_API_KEY}
      GOOGLE_GEMINI_API_KEY: ${GOOGLE_GEMINI_API_KEY}
      FOURSQUARE_API_KEY: ${FOURSQUARE_API_KEY}
      PARTNER_API_BASE_URL: ${PARTNER_API_BASE_URL:-http://backend:8000}
      BACKEND_CORS_ORIGINS: ${BACKEND_CORS_ORIGINS:-https://liberty-music.lol,https://www.liberty-music.lol,http://localhost:8080}
    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend:
    build:
      context: ./components/frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
    container_name: trip-planner-frontend
    depends_on:
      - backend
    ports:
      - "127.0.0.1:18080:8080"
