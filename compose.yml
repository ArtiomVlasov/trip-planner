services:
  db:
    image: postgis/postgis:16-3.4
    container_name: trip-planner-db
    env_file:
      - path: ./.env
        required: false
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 12

  backend:
    env_file:
      - path: ./.env
        required: false
    build:
      context: .
      dockerfile: components/backend/Dockerfile
    container_name: trip-planner-backend
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      SECRET_KEY: ${SECRET_KEY}
      GOOGLE_PLACES_API_KEY: ${GOOGLE_PLACES_API_KEY}
      GOOGLE_GEMINI_API_KEY: ${GOOGLE_GEMINI_API_KEY}
      FOURSQUARE_API_KEY: ${FOURSQUARE_API_KEY}
      PARTNER_API_BASE_URL: ${PARTNER_API_BASE_URL:-http://backend:8000}
      BACKEND_CORS_ORIGINS: ${BACKEND_CORS_ORIGINS:-https://trip.liberty-music.lol,http://localhost:8080,http://localhost:5173}

  frontend:
    build:
      context: ./components/frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
        VITE_GOOGLE_MAPS_API_KEY: ${VITE_GOOGLE_MAPS_API_KEY:-}
    container_name: trip-planner-frontend
    depends_on:
      - backend
    ports:
      - "127.0.0.1:8080:8080"

volumes:
  postgres_data:
